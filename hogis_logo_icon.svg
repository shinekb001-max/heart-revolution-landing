<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="300" viewBox="100 70 300 300"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink">

  <title>HOGIS Heart Meditation — Animated Logo</title>

  <defs>
    <!-- 배경 -->
    <radialGradient id="bg-purple" cx="50%" cy="44%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-gold" cx="50%" cy="44%" r="42%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.60"/>
      <stop offset="60%" stop-color="#fbbf24" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <!-- 하트 필 -->
    <radialGradient id="hf" cx="50%" cy="36%" r="65%">
      <stop offset="0%" stop-color="#ddd6fe" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.10"/>
    </radialGradient>
    <!-- 씨앗 -->
    <radialGradient id="sg" cx="36%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="sg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <!-- 연꽃 원 -->
    <radialGradient id="pg" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="pg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/>
    </radialGradient>

    <!-- 글로우 필터 -->
    <filter id="fglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fsoft" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fpetal" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fbg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- 하트 path 재사용 -->
    <path id="heart-d"
      d="M250,310 C212,282 152,258 152,217
         C152,188 172,170 196,173
         C213,175 228,188 250,205
         C272,188 287,175 304,173
         C328,170 348,188 348,217
         C348,258 288,282 250,310Z"/>
  </defs>

  <!-- 흰 배경 -->
  

  <!-- ════════════════════════════════
       배경 글로우 (항상 표시)
  ════════════════════════════════ -->
  <ellipse cx="250" cy="220" rx="180" ry="170" fill="url(#bg-purple)" filter="url(#fbg)">
    <animate attributeName="opacity" values="0;1;1;1;1" keyTimes="0;0.05;0.5;0.9;1" dur="20s" repeatCount="indefinite"/>
  </ellipse>

  <!-- ════════════════════════════════
       01 BREATH  (0–2s = 0–10%)
       보라 씨앗 글로우 등장
  ════════════════════════════════ -->
  <g filter="url(#fsoft)">
    <circle cx="250" cy="220" r="55" fill="#a78bfa" opacity="0">
      <animate attributeName="opacity" values="0;0.30;0.30;0.05;0.05" keyTimes="0;0.05;0.10;0.15;1" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="28" fill="#c4b5fd" opacity="0">
      <animate attributeName="opacity" values="0;0.50;0.50;0.08;0.08" keyTimes="0;0.04;0.10;0.15;1" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="10" fill="#ede9fe" opacity="0">
      <animate attributeName="opacity" values="0;0.95;0.95;0.10;0.10" keyTimes="0;0.03;0.10;0.15;1" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="3.5" fill="white" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.03;0.10;0.14;1" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ════════════════════════════════
       02 RADIANCE  (2–4s = 10–20%)
       황금빛 폭발
  ════════════════════════════════ -->
  <g filter="url(#fsoft)">
    <circle cx="250" cy="220" r="95" fill="url(#bg-gold)" opacity="0">
      <animate attributeName="opacity" values="0;0;0.80;0.80;0;0" keyTimes="0;0.10;0.14;0.20;0.26;1" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="52" fill="#fde68a" opacity="0">
      <animate attributeName="opacity" values="0;0;0.50;0.50;0;0" keyTimes="0;0.10;0.14;0.20;0.26;1" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- 황금 별빛 광선 -->
  <g filter="url(#fglow)">
    <line x1="250" y1="140" x2="250" y2="300" stroke="#fef9c3" stroke-width="2.0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.10;0.14;0.22;0.28;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="170" y1="220" x2="330" y2="220" stroke="#fef9c3" stroke-width="2.0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.95;0.95;0;0" keyTimes="0;0.10;0.14;0.22;0.28;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="193" y1="163" x2="307" y2="277" stroke="#fef9c3" stroke-width="1.2" opacity="0">
      <animate attributeName="opacity" values="0;0;0.75;0.75;0;0" keyTimes="0;0.10;0.14;0.22;0.28;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="307" y1="163" x2="193" y2="277" stroke="#fef9c3" stroke-width="1.2" opacity="0">
      <animate attributeName="opacity" values="0;0;0.75;0.75;0;0" keyTimes="0;0.10;0.14;0.22;0.28;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <circle cx="250" cy="220" r="7" fill="#fef9c3" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.10;0.14;0.22;0.28;1" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ════════════════════════════════
       03 HEART FORMS  (4–7s = 20–35%)
       하트 외곽선 그려짐
  ════════════════════════════════ -->
  <!-- 하트 필 -->
  <use href="#heart-d" fill="url(#hf)" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.95;0.95" keyTimes="0;0.20;0.30;0.38;1" dur="20s" repeatCount="indefinite"/>
  </use>
  <!-- 하트 외곽선 (dash 애니메이션) -->
  <use href="#heart-d" fill="none" stroke="#5b21b6" stroke-width="2.2"
    stroke-dasharray="900" stroke-dashoffset="900">
    <animate attributeName="stroke-dashoffset" values="900;900;900;0;0" keyTimes="0;0.20;0.22;0.35;1" dur="20s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.20;0.22;0.35;1" dur="20s" repeatCount="indefinite"/>
  </use>

  <!-- ════════════════════════════════
       04 RESONANCE  (7–10s = 35–50%)
       파동 3겹
  ════════════════════════════════ -->
  <!-- outer -->
  <path d="M250,345 C196,312 122,283 122,232
           C122,194 148,168 178,172
           C202,175 222,192 250,212
           C278,192 298,175 322,172
           C352,168 378,194 378,232
           C378,283 304,312 250,345Z"
    fill="none" stroke="#2dd4bf" stroke-width="0.9" opacity="0">
    <animate attributeName="opacity" values="0;0;0.22;0.22;0.28;0.22;0.22" keyTimes="0;0.35;0.43;0.65;0.72;0.85;1" dur="20s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="0.7;0.7;1;1;1.03;1;1" keyTimes="0;0.35;0.43;0.65;0.72;0.85;1" dur="20s" repeatCount="indefinite" additive="sum"/>
  </path>
  <!-- mid -->
  <path d="M250,333 C202,303 134,276 134,229
           C134,195 157,170 185,174
           C207,177 225,193 250,212
           C275,193 293,177 315,174
           C343,170 366,195 366,229
           C366,276 298,303 250,333Z"
    fill="none" stroke="#14b8a6" stroke-width="1.3" opacity="0">
    <animate attributeName="opacity" values="0;0;0.40;0.40;0.52;0.40;0.40" keyTimes="0;0.37;0.45;0.65;0.72;0.85;1" dur="20s" repeatCount="indefinite"/>
  </path>
  <!-- inner -->
  <path d="M250,322 C207,295 146,270 146,226
           C146,196 166,172 192,176
           C212,179 228,194 250,212
           C272,194 288,179 308,176
           C334,172 354,196 354,226
           C354,270 293,295 250,322Z"
    fill="none" stroke="#2dd4bf" stroke-width="1.6" opacity="0">
    <animate attributeName="opacity" values="0;0;0.58;0.58;0.70;0.58;0.58" keyTimes="0;0.39;0.48;0.65;0.72;0.85;1" dur="20s" repeatCount="indefinite"/>
  </path>

  <!-- ════════════════════════════════
       05 EXPANSION  (10–13s = 50–65%)
       연꽃 원 6개
       중심 250,230 / 거리 108
  ════════════════════════════════ -->
  <!-- glow + 실제 원 (각각 delay 적용) -->
  <!-- p1 위 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.85;0.85;0.75;0.75" keyTimes="0;0.50;0.54;0.58;0.65;0.88;1" dur="20s" repeatCount="indefinite"/>
    <circle cx="250" cy="122" r="16" fill="url(#pg2)" filter="url(#fpetal)"/>
    <circle cx="250" cy="122" r="9.5" fill="url(#pg)" stroke="#c4b5fd" stroke-width="1.0"/>
  </g>
  <!-- p2 우상 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.85;0.85;0.75;0.75" keyTimes="0;0.50;0.55;0.56;0.60;0.65;0.88;1" dur="20s" repeatCount="indefinite"/>
    <circle cx="344" cy="176" r="16" fill="url(#pg2)" filter="url(#fpetal)"/>
    <circle cx="344" cy="176" r="9.5" fill="url(#pg)" stroke="#c4b5fd" stroke-width="1.0"/>
  </g>
  <!-- p3 우하 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0.85;0.85;0.75;0.75" keyTimes="0;0.50;0.55;0.57;0.58;0.62;0.65;0.88;1" dur="20s" repeatCount="indefinite"/>
    <circle cx="344" cy="284" r="16" fill="url(#pg2)" filter="url(#fpetal)"/>
    <circle cx="344" cy="284" r="9.5" fill="url(#pg)" stroke="#c4b5fd" stroke-width="1.0"/>
  </g>
  <!-- p4 아래 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0;0;0.85;0.85;0.75;0.75" keyTimes="0;0.50;0.55;0.57;0.59;0.60;0.63;0.65;0.88;1" dur="20s" repeatCount="indefinite"/>
    <circle cx="250" cy="338" r="16" fill="url(#pg2)" filter="url(#fpetal)"/>
    <circle cx="250" cy="338" r="9.5" fill="url(#pg)" stroke="#c4b5fd" stroke-width="1.0"/>
  </g>
  <!-- p5 좌하 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.85;0.85;0.75;0.75" keyTimes="0;0.58;0.61;0.64;0.65;0.88;1" dur="20s" repeatCount="indefinite"/>
    <circle cx="156" cy="284" r="16" fill="url(#pg2)" filter="url(#fpetal)"/>
    <circle cx="156" cy="284" r="9.5" fill="url(#pg)" stroke="#c4b5fd" stroke-width="1.0"/>
  </g>
  <!-- p6 좌상 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.85;0.85;0.75;0.75" keyTimes="0;0.56;0.60;0.65;0.65;0.88;1" dur="20s" repeatCount="indefinite"/>
    <circle cx="156" cy="176" r="16" fill="url(#pg2)" filter="url(#fpetal)"/>
    <circle cx="156" cy="176" r="9.5" fill="url(#pg)" stroke="#c4b5fd" stroke-width="1.0"/>
  </g>

  <!-- ════════════════════════════════
       06 STILLNESS  (13–16s = 65–80%)
       씨앗 광선 8방향 + 씨앗 중심
  ════════════════════════════════ -->
  <g filter="url(#fglow)">
    <line x1="250" y1="220" x2="250" y2="196" stroke="#f59e0b" stroke-width="1.4" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0.75;1;0.8;1" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="250" y2="244" stroke="#f59e0b" stroke-width="1.4" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0.75;1;0.8;1" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="226" y2="220" stroke="#f59e0b" stroke-width="1.4" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0.75;1;0.8;1" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="274" y2="220" stroke="#f59e0b" stroke-width="1.4" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0.75;1;0.8;1" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="233" y2="203" stroke="#f59e0b" stroke-width="1.0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0.85;0.60;0.85;0.65;0.85" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="267" y2="203" stroke="#f59e0b" stroke-width="1.0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0.85;0.60;0.85;0.65;0.85" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="233" y2="237" stroke="#f59e0b" stroke-width="1.0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0.85;0.60;0.85;0.65;0.85" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="220" x2="267" y2="237" stroke="#f59e0b" stroke-width="1.0" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0.85;0.60;0.85;0.65;0.85" keyTimes="0;0.65;0.70;0.80;0.87;0.92;0.96;1" dur="20s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- 씨앗 중심 (03 이후 상주, 06에서 강화, 이후 숨쉼) -->
  <g filter="url(#fglow)">
    <circle cx="250" cy="220" r="14" fill="url(#sg2)" opacity="0">
      <animate attributeName="opacity" values="0;0;0.20;0.20;0.45;0.35;0.48;0.32;0.45" keyTimes="0;0.28;0.32;0.65;0.72;0.80;0.88;0.95;1" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="8" fill="url(#sg)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1;1;1" keyTimes="0;0.28;0.32;0.50;0.65;0.80;0.88;0.95;1" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="220" r="3" fill="white" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;1;1;1;1;1" keyTimes="0;0.28;0.32;0.50;0.65;0.80;0.88;0.95;1" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ════════════════════════════════
       WORDMARK  (16–18s = 80–90%)
  ════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.80;0.83;0.88;1" dur="20s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,14;0,14;0,14;0,0;0,0" keyTimes="0;0.80;0.83;0.88;1" dur="20s" repeatCount="indefinite" additive="sum"/>

    <!-- 상단 구분선 -->
    <line x1="75" y1="375" x2="425" y2="375" stroke="#7c3aed" stroke-width="0.7" opacity="0.45"/>

    <!-- HOGIS -->
    <text x="250" y="415" text-anchor="middle"
      font-family="Palatino Linotype, Palatino, Georgia, serif"
      font-size="46" font-weight="500" letter-spacing="10"
      fill="#2e1065">HOGIS</text>

    <!-- HEART MEDITATION -->
    <line x1="75" y1="430" x2="178" y2="430" stroke="#7c3aed" stroke-width="0.6" opacity="0.40"/>
    <text x="250" y="434" text-anchor="middle"
      font-family="Palatino Linotype, Palatino, Georgia, serif"
      font-size="11" letter-spacing="6.5" fill="#5b21b6">HEART MEDITATION</text>
    <line x1="322" y1="430" x2="425" y2="430" stroke="#7c3aed" stroke-width="0.6" opacity="0.40"/>

    <!-- 가슴명상 -->
    <text x="250" y="460" text-anchor="middle"
      font-family="NanumGothic, AppleGothic, sans-serif"
      font-size="14" letter-spacing="10" fill="#6d28d9">가슴명상</text>

    <!-- open · resonate · awaken -->
    <text x="250" y="486" text-anchor="middle"
      font-family="Palatino Linotype, Palatino, Georgia, serif"
      font-size="9.5" letter-spacing="3" fill="#0d9488" opacity="0.80">open · resonate · awaken</text>

    <!-- 하단 라인 -->
    <line x1="138" y1="497" x2="362" y2="497" stroke="#7c3aed" stroke-width="0.4" opacity="0.28"/>
  </g>

  <!-- LOOP 표시 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1;1" keyTimes="0;0.88;0.90;0.93;0.96;1" dur="20s" repeatCount="indefinite"/>
    <text x="250" y="520" text-anchor="middle"
      font-family="Palatino Linotype, Palatino, Georgia, serif"
      font-size="9" letter-spacing="5" fill="#9b8ecf" opacity="0.65">L O O P  ∞</text>
    <path d="M170,528 Q250,540 330,528" fill="none" stroke="#9b8ecf" stroke-width="0.9" opacity="0.40"/>
  </g>

</svg>
